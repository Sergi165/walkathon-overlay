<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Walkathon Tracker + Chat</title>
  <style>
    :root{
      --bg:#0f1115;
      --panel:#171a21;
      --muted:#a6adbb;
      --green:#39ff14;
      --green2:#00d26a;
      --line:#2a2f3a;
      --white:#fff;
      --accent:#8b5cf6;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--white);
      font-family: Arial, sans-serif;
    }

    .wrap {
      padding: 12px;
      display: grid;
      gap: 12px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
    }

    .title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .big {
      font-size: 34px;
      font-weight: 700;
      color: var(--green);
      line-height: 1.1;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
    }

    .stat .k {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .stat .v {
      font-size: 18px;
      font-weight: 700;
    }

    .bar {
      margin-top: 10px;
      height: 18px;
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--green2));
      transition: width .35s ease;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      color: white;
      font-weight: 700;
      background: #252a35;
    }

    button.primary { background: #1f6feb; }
    button.danger { background: #d73a49; }
    button.ok { background: #238636; }

    .compass {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .rose {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      border: 2px solid var(--line);
      position: relative;
      background: radial-gradient(circle at center, #1c2130, #11151d);
      flex: 0 0 auto;
    }

    .needle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4px;
      height: 34px;
      background: linear-gradient(180deg, #ff4d4d, #fff);
      transform-origin: center 28px;
      translate: -50% -80%;
      border-radius: 4px;
    }

    .rose .n, .rose .e, .rose .s, .rose .w {
      position: absolute;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .rose .n { left: 50%; top: 4px; transform: translateX(-50%); color: #ff7b7b; }
    .rose .s { left: 50%; bottom: 4px; transform: translateX(-50%); }
    .rose .e { right: 6px; top: 50%; transform: translateY(-50%); }
    .rose .w { left: 6px; top: 50%; transform: translateY(-50%); }

    #chat {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 46vh;
      overflow: auto;
      padding-right: 4px;
    }

    .msg {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      line-height: 1.35;
      word-break: break-word;
    }

    .msg .name {
      font-weight: 700;
      margin-right: 6px;
    }

    .msg .time {
      color: var(--muted);
      font-size: 11px;
      margin-left: 6px;
    }

    .msg img.emote {
      height: 24px;
      vertical-align: middle;
      margin: 0 2px;
    }

    .muted { color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">Walkathon Tracker</div>
      <div class="big" id="done">0m</div>
      <div class="muted" id="left">LEFT: 10000m</div>

      <div class="bar"><div class="fill" id="fill"></div></div>

      <div class="meta" style="margin-top:10px">
        <div class="stat">
          <div class="k">Status</div>
          <div class="v" id="status">idle</div>
        </div>
        <div class="stat">
          <div class="k">Accuracy</div>
          <div class="v" id="acc">-</div>
        </div>
        <div class="stat">
          <div class="k">Speed</div>
          <div class="v" id="speed">-</div>
        </div>
        <div class="stat">
          <div class="k">Heading</div>
          <div class="v" id="headingText">-</div>
        </div>
      </div>

      <div class="row" style="margin-top:12px">
        <button class="primary" id="startBtn">Start GPS</button>
        <button class="ok" id="stopBtn">Stop</button>
        <button class="danger" id="resetBtn">Reset</button>
      </div>
    </div>

    <div class="card">
      <div class="title">Compass</div>
      <div class="compass">
        <div class="rose">
          <div class="needle" id="needle"></div>
          <div class="n">N</div>
          <div class="e">E</div>
          <div class="s">S</div>
          <div class="w">W</div>
        </div>
        <div>
          <div class="big" id="headingDeg">0°</div>
          <div class="muted" id="headingDir">N</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="title">Twitch Chat + 7TV — sergiei2</div>
      <div class="muted" id="chatStatus">connecting...</div>
      <div id="chat" style="margin-top:10px"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase, ref, set, update, onValue
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // ========== FIREBASE ==========
    const firebaseConfig = {
      apiKey: "AIzaSyCZbd5_egCnte2hKI7PmKgduHpyw1v7jAo",
      authDomain: "walkathon-a4233.firebaseapp.com",
      databaseURL: "https://walkathon-a4233-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "walkathon-a4233",
      storageBucket: "walkathon-a4233.firebasestorage.app",
      messagingSenderId: "314823180241",
      appId: "1:314823180241:web:bbfe6e689c18ec5d922af0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const stateRef = ref(db, 'walkathon/state');

    // ========== WALKATHON ==========
    const GOAL_METERS = 10000;
    const MIN_ACCURACY = 35;      // игнорируем точки хуже этого
    const MIN_STEP_METERS = 5;    // шум до 5м игнорируем
    const MAX_STEP_METERS = 120;  // нереальные скачки игнорируем

    const doneEl = document.getElementById('done');
    const leftEl = document.getElementById('left');
    const fillEl = document.getElementById('fill');
    const statusEl = document.getElementById('status');
    const accEl = document.getElementById('acc');
    const speedEl = document.getElementById('speed');

    let watchId = null;
    let lastPoint = null;
    let distanceMeters = 0;

    function fmtMeters(m) {
      if (m >= 1000) return (m / 1000).toFixed(2) + 'km';
      return Math.round(m) + 'm';
    }

    function updateUI(extra = {}) {
      const left = Math.max(GOAL_METERS - distanceMeters, 0);
      const percent = Math.min((distanceMeters / GOAL_METERS) * 100, 100);

      doneEl.textContent = fmtMeters(distanceMeters);
      leftEl.textContent = 'LEFT: ' + fmtMeters(left);
      fillEl.style.width = percent + '%';

      if (extra.status) statusEl.textContent = extra.status;
      if (extra.acc != null) accEl.textContent = Math.round(extra.acc) + 'm';
      if (extra.speed != null && !Number.isNaN(extra.speed)) {
        speedEl.textContent = (extra.speed * 3.6).toFixed(1) + ' km/h';
      }
    }

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(a));
    }

    async function pushState(status, extra = {}) {
      await update(stateRef, {
        distanceMeters: Math.round(distanceMeters),
        goalMeters: GOAL_METERS,
        leftMeters: Math.max(GOAL_METERS - Math.round(distanceMeters), 0),
        status,
        updatedAt: Date.now(),
        ...extra
      });
    }

    async function startGPS() {
      if (!('geolocation' in navigator)) {
        alert('Geolocation не поддерживается');
        return;
      }
      if (watchId != null) return;

      statusEl.textContent = 'starting';

      watchId = navigator.geolocation.watchPosition(async (pos) => {
        const { latitude, longitude, accuracy, speed } = pos.coords;

        if (accuracy && accuracy > MIN_ACCURACY) {
          updateUI({ status: 'weak gps', acc: accuracy, speed });
          await pushState('weak gps', { accuracy });
          return;
        }

        const point = { lat: latitude, lon: longitude };

        if (lastPoint) {
          const step = haversine(lastPoint.lat, lastPoint.lon, point.lat, point.lon);

          if (step >= MIN_STEP_METERS && step <= MAX_STEP_METERS) {
            distanceMeters += step;
          }
        }

        lastPoint = point;
        updateUI({ status: 'tracking', acc: accuracy, speed });
        await pushState('tracking', { accuracy, speed: speed ?? 0 });
      }, async (err) => {
        statusEl.textContent = 'gps error';
        await pushState('gps error', { error: err.message || 'unknown' });
      }, {
        enableHighAccuracy: true,
        maximumAge: 1000,
        timeout: 10000
      });
    }

    async function stopGPS() {
      if (watchId != null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      await pushState('stopped');
      statusEl.textContent = 'stopped';
    }

    async function resetGPS() {
      if (!confirm('Сбросить дистанцию?')) return;
      distanceMeters = 0;
      lastPoint = null;
      updateUI({ status: 'reset', acc: null, speed: null });
      await set(stateRef, {
        distanceMeters: 0,
        goalMeters: GOAL_METERS,
        leftMeters: GOAL_METERS,
        status: 'reset',
        updatedAt: Date.now()
      });
    }

    document.getElementById('startBtn').onclick = startGPS;
    document.getElementById('stopBtn').onclick = stopGPS;
    document.getElementById('resetBtn').onclick = resetGPS;

    onValue(stateRef, (snap) => {
      const s = snap.val() || {};
      if (typeof s.distanceMeters === 'number') {
        distanceMeters = Number(s.distanceMeters || 0);
        updateUI({
          status: s.status || 'idle',
          acc: s.accuracy ?? null,
          speed: s.speed ?? null
        });
      }
    });

    // ========== COMPASS ==========
    const needleEl = document.getElementById('needle');
    const headingDegEl = document.getElementById('headingDeg');
    const headingDirEl = document.getElementById('headingDir');
    const headingTextEl = document.getElementById('headingText');

    function degToDir(deg) {
      const dirs = ['N','NE','E','SE','S','SW','W','NW'];
      return dirs[Math.round(deg / 45) % 8];
    }

    function setHeading(deg) {
      const n = ((deg % 360) + 360) % 360;
      needleEl.style.transform = `translate(-50%, -80%) rotate(${n}deg)`;
      headingDegEl.textContent = Math.round(n) + '°';
      const dir = degToDir(n);
      headingDirEl.textContent = dir;
      headingTextEl.textContent = dir;
    }

    async function initCompass() {
      try {
        if (typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function') {
          const res = await DeviceOrientationEvent.requestPermission();
          if (res !== 'granted') return;
        }

        window.addEventListener('deviceorientationabsolute', (e) => {
          if (typeof e.alpha === 'number') setHeading(e.alpha);
        }, true);

        window.addEventListener('deviceorientation', (e) => {
          if (typeof e.alpha === 'number') setHeading(e.alpha);
        }, true);
      } catch {}
    }
    initCompass();

    // ========== TWITCH CHAT + 7TV ==========
    const chatEl = document.getElementById('chat');
    const chatStatusEl = document.getElementById('chatStatus');

    const CHANNEL_LOGIN = 'sergiei2';

    // Публичный client-id Twitch (для тестов часто работает, но не гарантируется вечно)
    const TWITCH_CLIENT_ID = 'kimne78kx3ncx6brgo4mv6wki5h1ko';

    let broadcasterId = null;
    let eventSocket = null;
    let sevenTvMap = new Map();

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, m => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'
      }[m]));
    }

    function renderTextWith7TV(text) {
      const parts = text.split(/(\s+)/);
      return parts.map(p => {
        const em = sevenTvMap.get(p);
        if (em) {
          return `<img class="emote" src="${em}" alt="${p}" title="${p}">`;
        }
        return escapeHtml(p);
      }).join('');
    }

    function addMessage({ username, color, text }) {
      const div = document.createElement('div');
      div.className = 'msg';
      const t = new Date();
      const time = t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      div.innerHTML = `
        <span class="name" style="color:${color || '#8ab4ff'}">${escapeHtml(username || 'user')}</span>
        <span class="time">${time}</span>
        <div class="body" style="margin-top:4px">${renderTextWith7TV(text || '')}</div>
      `;

      chatEl.appendChild(div);
      while (chatEl.children.length > 80) chatEl.removeChild(chatEl.firstChild);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    async function load7TVForChannel() {
      try {
        // 7TV v3 users by twitch login
        const userRes = await fetch(`https://7tv.io/v3/users/twitch/${CHANNEL_LOGIN}`);
        if (!userRes.ok) throw new Error('7TV user not found');
        const user = await userRes.json();

        const emoteSet = user?.emote_set?.emotes || [];
        sevenTvMap.clear();

        for (const em of emoteSet) {
          const name = em.name;
          const files = em.data?.host?.files || [];
          const hostUrl = em.data?.host?.url;
          const preferred = files.find(f => f.name.includes('2x')) || files[0];
          if (name && hostUrl && preferred?.name) {
            sevenTvMap.set(name, `https:${hostUrl}/${preferred.name}`);
          }
        }

        chatStatusEl.textContent = `chat connected · 7TV loaded: ${sevenTvMap.size}`;
      } catch (e) {
        chatStatusEl.textContent = 'chat connected · 7TV load failed';
      }
    }

    async function getBroadcasterId(login) {
      const res = await fetch(`https://api.twitch.tv/helix/users?login=${encodeURIComponent(login)}`, {
        headers: {
          'Client-ID': TWITCH_CLIENT_ID
        }
      });
      const data = await res.json();
      return data?.data?.[0]?.id || null;
    }

    function connectEventSub() {
      eventSocket = new WebSocket('wss://eventsub.wss.twitch.tv/ws');

      eventSocket.onopen = () => {
        chatStatusEl.textContent = 'eventsub connected...';
      };

      eventSocket.onmessage = async (event) => {
        const msg = JSON.parse(event.data);
        const type = msg?.metadata?.message_type;

        if (type === 'session_welcome') {
          const sessionId = msg.payload.session.id;

          await fetch('https://api.twitch.tv/helix/eventsub/subscriptions', {
            method: 'POST',
            headers: {
              'Client-ID': TWITCH_CLIENT_ID,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              type: 'channel.chat.message',
              version: '1',
              condition: {
                broadcaster_user_id: broadcasterId,
                user_id: broadcasterId
              },
              transport: {
                method: 'websocket',
                session_id: sessionId
              }
            })
          }).catch(() => {});
        }

        if (type === 'notification') {
          const ev = msg.payload.event;
          if (ev && ev.message) {
            addMessage({
              username: ev.chatter_user_name || ev.chatter_user_login,
              color: '#8ab4ff',
              text: ev.message.text || ''
            });
          }
        }

        if (type === 'session_keepalive') {
          // noop
        }
      };

      eventSocket.onclose = () => {
        chatStatusEl.textContent = 'chat disconnected, reconnecting...';
        setTimeout(connectEventSub, 4000);
      };

      eventSocket.onerror = () => {
        chatStatusEl.textContent = 'chat error';
      };
    }

    async function initChat() {
      try {
        broadcasterId = await getBroadcasterId(CHANNEL_LOGIN);
        if (!broadcasterId) {
          chatStatusEl.textContent = 'cannot resolve twitch user';
          return;
        }
        await load7TVForChannel();
        connectEventSub();
      } catch (e) {
        chatStatusEl.textContent = 'chat init failed';
      }
    }

    initChat();
    updateUI({ status: 'idle' });
  </script>
</body>
</html>
