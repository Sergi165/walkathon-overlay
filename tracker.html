<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Walkathon Tracker</title>

  <script>
    const CHANNEL_NAME = "sergiei2";
    const MESSAGE_LIFETIME = 15;
    const MAX_MESSAGES = 40;
  </script>

  <style>
    :root{
      --bg:#0f1115;
      --panel:#171a21;
      --muted:#a6adbb;
      --green:#39ff14;
      --green2:#00d26a;
      --line:#2a2f3a;
      --white:#fff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--white);
      font-family: Arial, sans-serif;
    }

    .wrap {
      padding: 12px;
      display: grid;
      gap: 12px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
    }

    .title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .big {
      font-size: 34px;
      font-weight: 700;
      color: var(--green);
      line-height: 1.1;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
    }

    .stat .k {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .stat .v {
      font-size: 18px;
      font-weight: 700;
    }

    .bar {
      margin-top: 10px;
      height: 18px;
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--green2));
      transition: width .35s ease;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      color: white;
      font-weight: 700;
      background: #252a35;
      cursor: pointer;
    }

    button.primary { background: #1f6feb; }
    button.danger { background: #d73a49; }
    button.ok { background: #238636; }

    .compass {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .rose {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      border: 2px solid var(--line);
      position: relative;
      background: radial-gradient(circle at center, #1c2130, #11151d);
      flex: 0 0 auto;
    }

    .needle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4px;
      height: 34px;
      background: linear-gradient(180deg, #ff4d4d, #fff);
      transform-origin: center 26px;
      transform: translate(-50%, -100%) rotate(0deg);
      border-radius: 4px;
    }

    .rose .n, .rose .e, .rose .s, .rose .w {
      position: absolute;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .rose .n { left: 50%; top: 4px; transform: translateX(-50%); color: #ff7b7b; }
    .rose .s { left: 50%; bottom: 4px; transform: translateX(-50%); }
    .rose .e { right: 6px; top: 50%; transform: translateY(-50%); }
    .rose .w { left: 6px; top: 50%; transform: translateY(-50%); }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .chat-status {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    #chat {
      display: flex;
      flex-direction: column-reverse;
      gap: 6px;
      max-height: 420px;
      overflow: hidden;
    }

    .message {
      padding: 6px 8px;
      border-radius: 8px;
      background: rgba(255,255,255,.05);
      color: #fff;
      font-size: 16px;
      line-height: 1.3;
      opacity: 0;
      animation: fadeIn 0.2s forwards;
      max-width: 100%;
      word-wrap: break-word;
    }

    .message.fade-out {
      animation: fadeOut 0.4s forwards;
    }

    .username {
      font-weight: 700;
      margin-right: 6px;
    }

    .stream-preview {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      border-radius: 12px;
      background: #000;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-6px); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">Stream Preview — sergiei2</div>
      <iframe
        class="stream-preview"
        src="https://player.twitch.tv/?channel=sergiei2&parent=sergi165.github.io&muted=true"
        allowfullscreen>
      </iframe>
    </div>

    <div class="card">
      <div class="title">Walkathon Tracker</div>
      <div class="big" id="done">0m</div>
      <div class="muted" id="left">LEFT: 10000m</div>

      <div class="bar"><div class="fill" id="fill"></div></div>

      <div class="meta" style="margin-top:10px">
        <div class="stat">
          <div class="k">Status</div>
          <div class="v" id="status">idle</div>
        </div>
        <div class="stat">
          <div class="k">Accuracy</div>
          <div class="v" id="acc">-</div>
        </div>
        <div class="stat">
          <div class="k">Speed</div>
          <div class="v" id="speed">-</div>
        </div>
        <div class="stat">
          <div class="k">Heading</div>
          <div class="v" id="headingText">-</div>
        </div>
      </div>

      <div class="row" style="margin-top:12px">
        <button class="primary" id="startBtn">Start GPS</button>
        <button class="ok" id="stopBtn">Stop</button>
        <button class="danger" id="resetBtn">Reset</button>
      </div>
    </div>

    <div class="card">
      <div class="title">Compass</div>
      <div class="compass">
        <div class="rose">
          <div class="needle" id="needle"></div>
          <div class="n">N</div>
          <div class="e">E</div>
          <div class="s">S</div>
          <div class="w">W</div>
        </div>
        <div>
          <div class="big" id="headingDeg">0°</div>
          <div class="muted" id="headingDir">N</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="title">Twitch Chat — sergiei2</div>
      <div class="chat-status" id="chatStatus">starting...</div>
      <div id="chat"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase, ref, set, update, onValue
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCZbd5_egCnte2hKI7PmKgduHpyw1v7jAo",
      authDomain: "walkathon-a4233.firebaseapp.com",
      databaseURL: "https://walkathon-a4233-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "walkathon-a4233",
      storageBucket: "walkathon-a4233.firebasestorage.app",
      messagingSenderId: "314823180241",
      appId: "1:314823180241:web:bbfe6e689c18ec5d922af0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const stateRef = ref(db, 'walkathon/state');

    const GOAL_METERS = 10000;
    const MIN_ACCURACY = 35;
    const MIN_STEP_METERS = 5;
    const MAX_STEP_METERS = 120;

    const doneEl = document.getElementById('done');
    const leftEl = document.getElementById('left');
    const fillEl = document.getElementById('fill');
    const statusEl = document.getElementById('status');
    const accEl = document.getElementById('acc');
    const speedEl = document.getElementById('speed');

    let watchId = null;
    let lastPoint = null;
    let distanceMeters = 0;

    function fmtMeters(m) {
      if (m >= 1000) return (m / 1000).toFixed(2) + 'km';
      return Math.round(m) + 'm';
    }

    function updateUI(extra = {}) {
      const left = Math.max(GOAL_METERS - distanceMeters, 0);
      const percent = Math.min((distanceMeters / GOAL_METERS) * 100, 100);

      doneEl.textContent = fmtMeters(distanceMeters);
      leftEl.textContent = 'LEFT: ' + fmtMeters(left);
      fillEl.style.width = percent + '%';

      if (extra.status) statusEl.textContent = extra.status;
      if (extra.acc != null) accEl.textContent = Math.round(extra.acc) + 'm';
      if (extra.speed != null && !Number.isNaN(extra.speed)) {
        speedEl.textContent = (extra.speed * 3.6).toFixed(1) + ' km/h';
      }
    }

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(a));
    }

    async function pushState(status, extra = {}) {
      await update(stateRef, {
        distanceMeters: Math.round(distanceMeters),
        goalMeters: GOAL_METERS,
        leftMeters: Math.max(GOAL_METERS - Math.round(distanceMeters), 0),
        status,
        updatedAt: Date.now(),
        ...extra
      });
    }

    async function startGPS() {
      if (!('geolocation' in navigator)) {
        alert('Geolocation не поддерживается');
        return;
      }
      if (watchId != null) return;

      statusEl.textContent = 'starting';

      watchId = navigator.geolocation.watchPosition(async (pos) => {
        const { latitude, longitude, accuracy, speed } = pos.coords;

        if (accuracy && accuracy > MIN_ACCURACY) {
          updateUI({ status: 'weak gps', acc: accuracy, speed });
          await pushState('weak gps', { accuracy, latitude, longitude, speed: speed ?? 0 });
          return;
        }

        const point = { lat: latitude, lon: longitude };

        if (lastPoint) {
          const step = haversine(lastPoint.lat, lastPoint.lon, point.lat, point.lon);

          if (step >= MIN_STEP_METERS && step <= MAX_STEP_METERS) {
            distanceMeters += step;
          }
        }

        lastPoint = point;
        updateUI({ status: 'tracking', acc: accuracy, speed });
        await pushState('tracking', {
          accuracy,
          speed: speed ?? 0,
          latitude,
          longitude
        });
      }, async (err) => {
        statusEl.textContent = 'gps error';
        await pushState('gps error', { error: err.message || 'unknown' });
      }, {
        enableHighAccuracy: true,
        maximumAge: 1000,
        timeout: 10000
      });
    }

    async function stopGPS() {
      if (watchId != null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      await pushState('stopped');
      statusEl.textContent = 'stopped';
    }

    async function resetGPS() {
      if (!confirm('Сбросить дистанцию?')) return;
      distanceMeters = 0;
      lastPoint = null;
      updateUI({ status: 'reset', acc: null, speed: null });
      await set(stateRef, {
        distanceMeters: 0,
        goalMeters: GOAL_METERS,
        leftMeters: GOAL_METERS,
        status: 'reset',
        updatedAt: Date.now()
      });
    }

    document.getElementById('startBtn').onclick = startGPS;
    document.getElementById('stopBtn').onclick = stopGPS;
    document.getElementById('resetBtn').onclick = resetGPS;

    onValue(stateRef, (snap) => {
      const s = snap.val() || {};
      if (typeof s.distanceMeters === 'number') {
        distanceMeters = Number(s.distanceMeters || 0);
        updateUI({
          status: s.status || 'idle',
          acc: s.accuracy ?? null,
          speed: s.speed ?? null
        });
      }
    });

    const needleEl = document.getElementById('needle');
    const headingDegEl = document.getElementById('headingDeg');
    const headingDirEl = document.getElementById('headingDir');
    const headingTextEl = document.getElementById('headingText');

    function degToDir(deg) {
      const dirs = ['N','NE','E','SE','S','SW','W','NW'];
      return dirs[Math.round(deg / 45) % 8];
    }

    let smoothHeading = 0;
    let hasHeading = false;

    function angleDelta(a, b) {
      return (b - a + 540) % 360 - 180;
    }

    function setHeading(deg) {
      const target = ((deg % 360) + 360) % 360;

      if (!hasHeading) {
        smoothHeading = target;
        hasHeading = true;
      } else {
        const d = angleDelta(smoothHeading, target);
        if (Math.abs(d) < 1) return;
        smoothHeading = (smoothHeading + d * 0.15 + 360) % 360;
      }

      needleEl.style.transform = `translate(-50%, -100%) rotate(${smoothHeading}deg)`;
      headingDegEl.textContent = Math.round(smoothHeading) + '°';
      const dir = degToDir(smoothHeading);
      headingDirEl.textContent = dir;
      headingTextEl.textContent = dir;
    }

    async function initCompass() {
      try {
        if (typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function') {
          const res = await DeviceOrientationEvent.requestPermission();
          if (res !== 'granted') return;
        }

        window.addEventListener('deviceorientationabsolute', (e) => {
          if (typeof e.alpha === 'number') setHeading(e.alpha);
        }, true);

        window.addEventListener('deviceorientation', (e) => {
          if (typeof e.alpha === 'number') setHeading(e.alpha);
        }, true);
      } catch (e) {
        console.log('Compass init error', e);
      }
    }

    const chatEl = document.getElementById("chat");
    const chatStatusEl = document.getElementById("chatStatus");

    function setChatStatus(text) {
      chatStatusEl.textContent = text;
    }

    function addMessage(username, text, color) {
      const msg = document.createElement("div");
      msg.className = "message";

      const nameSpan = document.createElement("span");
      nameSpan.className = "username";
      nameSpan.textContent = username + ":";
      if (color) nameSpan.style.color = color;
      msg.appendChild(nameSpan);

      const textSpan = document.createElement("span");
      textSpan.textContent = text;
      msg.appendChild(textSpan);

      chatEl.prepend(msg);

      while (chatEl.children.length > MAX_MESSAGES) {
        chatEl.lastChild.remove();
      }

      setTimeout(() => {
        msg.classList.add("fade-out");
        setTimeout(() => msg.remove(), 400);
      }, MESSAGE_LIFETIME * 1000);
    }

    let ws;

    function connectTwitch() {
      if (!CHANNEL_NAME) {
        setChatStatus("channel not set");
        return;
      }

      const nick = "justinfan" + Math.floor(Math.random() * 80000 + 1000);
      ws = new WebSocket("wss://irc-ws.chat.twitch.tv:443");

      ws.addEventListener("open", () => {
        setChatStatus("connected");

        ws.send("CAP REQ :twitch.tv/tags twitch.tv/commands twitch.tv/membership\r\n");
        ws.send("NICK " + nick + "\r\n");
        ws.send("JOIN #" + CHANNEL_NAME.toLowerCase() + "\r\n");
      });

      ws.addEventListener("message", (event) => {
        const lines = event.data.split("\r\n");
        for (const line of lines) {
          if (!line) continue;

          if (line.startsWith("PING")) {
            ws.send("PONG :tmi.twitch.tv\r\n");
            continue;
          }

          handleIrcLine(line);
        }
      });

      ws.addEventListener("close", () => {
        setChatStatus("reconnecting in 5s...");
        setTimeout(connectTwitch, 5000);
      });

      ws.addEventListener("error", () => {
        setChatStatus("socket error");
        ws.close();
      });
    }

    function handleIrcLine(line) {
      let tags = {};
      let rest = line;

      if (rest.startsWith("@")) {
        const spaceIdx = rest.indexOf(" ");
        const tagStr = rest.slice(1, spaceIdx);
        rest = rest.slice(spaceIdx + 1);

        tagStr.split(";").forEach(part => {
          const [k, v] = part.split("=");
          tags[k] = v || "";
        });
      }

      if (!rest.startsWith(":")) return;

      const prefixEnd = rest.indexOf(" ");
      const prefix = rest.slice(1, prefixEnd);
      rest = rest.slice(prefixEnd + 1);

      const spaceIdx = rest.indexOf(" ");
      const command = rest.slice(0, spaceIdx);
      const params = rest.slice(spaceIdx + 1);

      if (command === "PRIVMSG") {
        const msgIdx = params.indexOf(" :");
        if (msgIdx === -1) return;

        const text = params.slice(msgIdx + 2).slice(0, 350);
        const username = (tags["display-name"] || prefix.split("!")[0]) || "user";
        const color = tags["color"] || "#ffffff";

        addMessage(username, text, color);
      }
    }

    initCompass();
    updateUI({ status: 'idle' });
    connectTwitch();
  </script>
</body>
</html>
