<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Walkathon Overlay</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    .clockbox {
      position: absolute;
      left: 18px;
      bottom: 190px;
      width: 320px;
      padding: 14px 16px;
      background: rgba(10,10,16,.62);
      border-left: 4px solid #7c3aed;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,.25);
      backdrop-filter: blur(4px);
    }

    .city {
      font-size: 12px;
      letter-spacing: .18em;
      color: #c6c8d0;
      font-weight: 700;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .clockrow {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .clock {
      font-size: 64px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 1px;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,.12);
      margin: 10px 0 10px;
    }

    .weatherrow {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
    }

    .temp {
      font-size: 18px;
      color: #fff;
    }

    .date {
      font-size: 15px;
      color: #c5c7d0;
      font-weight: 600;
    }

    .hud {
      position: absolute;
      left: 18px;
      bottom: 18px;
      width: 360px;
      padding: 14px;
      background: rgba(0,0,0,.42);
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,.25);
    }

    .topline {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .done {
      font-size: 42px;
      font-weight: 700;
      color: #39ff14;
      line-height: 1;
      text-shadow: 0 0 8px rgba(57,255,20,.25);
    }

    .goal {
      font-size: 14px;
      opacity: .85;
    }

    .left {
      margin-top: 10px;
      font-size: 18px;
      color: #7CFF6B;
      font-weight: 700;
    }

    .sub {
      margin-top: 8px;
      font-size: 14px;
      opacity: .92;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .bar {
      margin-top: 12px;
      height: 18px;
      background: rgba(255,255,255,.16);
      border-radius: 999px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #39ff14, #00d26a);
      transition: width .4s ease;
    }

    .pct {
      margin-top: 8px;
      font-size: 13px;
      opacity: .9;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="clockbox">
    <div class="city" id="city">LOADING LOCATION...</div>

    <div class="clockrow">
      <div class="clock" id="clock">00:00:00</div>
    </div>

    <div class="divider"></div>

    <div class="weatherrow">
      <div class="temp" id="temp">--°C</div>
      <div class="date" id="date">---</div>
    </div>
  </div>

  <div class="hud">
    <div class="topline">
      <div class="done" id="done">0m</div>
      <div class="goal">GOAL: 10km</div>
    </div>

    <div class="left" id="left">LEFT: 10000m</div>

    <div class="sub">
      <span id="walked">WALKED: 0m</span>
      <span id="status">GPS: idle</span>
    </div>

    <div class="bar">
      <div class="fill" id="fill"></div>
    </div>

    <div class="pct" id="pct">0.0%</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCZbd5_egCnte2hKI7PmKgduHpyw1v7jAo",
      authDomain: "walkathon-a4233.firebaseapp.com",
      databaseURL: "https://walkathon-a4233-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "walkathon-a4233",
      storageBucket: "walkathon-a4233.firebasestorage.app",
      messagingSenderId: "314823180241",
      appId: "1:314823180241:web:bbfe6e689c18ec5d922af0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const doneEl = document.getElementById('done');
    const leftEl = document.getElementById('left');
    const walkedEl = document.getElementById('walked');
    const fillEl = document.getElementById('fill');
    const pctEl = document.getElementById('pct');
    const statusEl = document.getElementById('status');

    const clockEl = document.getElementById('clock');
    const tempEl = document.getElementById('temp');
    const dateEl = document.getElementById('date');
    const cityEl = document.getElementById('city');

    let lastWeatherKey = '';

    function fmtMeters(m) {
      if (m >= 1000) return (m / 1000).toFixed(2) + 'km';
      return Math.round(m) + 'm';
    }

    function updateClock() {
      const now = new Date();

      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');

      clockEl.textContent = `${h}:${m}:${s}`;

      const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

      dateEl.textContent =
        weekdays[now.getDay()] + ', ' +
        now.getDate() + ' ' +
        months[now.getMonth()];
    }

    updateClock();
    setInterval(updateClock, 1000);

    async function updateWeatherAndCity(lat, lon) {
      try {
        const roundedKey = `${lat.toFixed(3)},${lon.toFixed(3)}`;
        if (roundedKey === lastWeatherKey) return;
        lastWeatherKey = roundedKey;

        const weatherRes = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m`
        );
        const weatherData = await weatherRes.json();

        if (weatherData && weatherData.current && typeof weatherData.current.temperature_2m !== 'undefined') {
          tempEl.textContent = Math.round(weatherData.current.temperature_2m) + '°C';
        }

        const geoRes = await fetch(
          `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`
        );
        const geoData = await geoRes.json();

        if (geoData && geoData.address) {
          const city =
            geoData.address.city ||
            geoData.address.town ||
            geoData.address.village ||
            geoData.address.hamlet ||
            geoData.address.county ||
            'UNKNOWN';

          const country =
            geoData.address.country_code
              ? geoData.address.country_code.toUpperCase()
              : '';

          cityEl.textContent = `${city} · ${country}`;
        } else {
          cityEl.textContent = 'LOCATION UNKNOWN';
        }
      } catch (e) {
        cityEl.textContent = 'LOCATION UNAVAILABLE';
      }
    }

    const stateRef = ref(db, 'walkathon/state');

    onValue(stateRef, (snap) => {
      const s = snap.val() || {};
      const distance = Number(s.distanceMeters || 0);
      const goal = Number(s.goalMeters || 10000);
      const left = Math.max(goal - distance, 0);
      const percent = Math.min((distance / goal) * 100, 100);

      doneEl.textContent = fmtMeters(distance);
      leftEl.textContent = 'LEFT: ' + fmtMeters(left);
      walkedEl.textContent = 'WALKED: ' + fmtMeters(distance);
      fillEl.style.width = percent + '%';
      pctEl.textContent = percent.toFixed(1) + '%';
      statusEl.textContent = 'GPS: ' + (s.status || 'idle');

      const goalEl = document.querySelector('.goal');
      goalEl.textContent = 'GOAL: ' + fmtMeters(goal);

      if (typeof s.latitude === 'number' && typeof s.longitude === 'number') {
        updateWeatherAndCity(s.latitude, s.longitude);
      } else {
        cityEl.textContent = 'WAITING FOR GPS...';
      }
    });
  </script>
</body>
</html>
