<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Walkathon Overlay</title>
  <style>
    html, body{
      margin:0;
      width:100%;
      height:100%;
      background:transparent;
      overflow:hidden;
      font-family: Arial, sans-serif;
      color:#fff;
    }

    /* ====== FRIEND IMAGES LAYERS ====== */
    .imgLayer{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }
    #imgBack{ z-index: 1; }
    #hudWrap{ z-index: 10; position:absolute; inset:0; }
    #imgFront{ z-index: 20; }

    .ovItem{
      position:absolute;
      left:0;
      top:0;
      transform-origin:center center;
      will-change: transform, opacity;
    }

    /* ====== TOP WEATHER STRIP ====== */
    .weatherStrip{
      position:absolute;
      left:18px;
      bottom: 260px;
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 12px;
      border-radius:12px;
      background: rgba(10,10,16,.62);
      border-left: 4px solid #7c3aed;
      box-shadow: 0 8px 30px rgba(0,0,0,.25);
      backdrop-filter: blur(4px);
    }
    .wsCity{
      font-size:12px;
      letter-spacing:.16em;
      color:#c6c8d0;
      font-weight:800;
      text-transform:uppercase;
      max-width: 360px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .wsTemp{
      font-size:16px;
      font-weight:800;
    }
    .wsClock{
      font-size:16px;
      font-weight:900;
      letter-spacing:.04em;
    }
    .wsDate{
      font-size:12px;
      color:#c6c8d0;
      font-weight:700;
    }
    .wsSep{
      width:1px;
      height:18px;
      background: rgba(255,255,255,.14);
      margin: 0 2px;
    }

    /* ====== MAIN PANEL (LIKE YOUR SCREENSHOT) ====== */
    .panel{
      position:absolute;
      left:18px;
      bottom:18px;
      width: 520px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(0,0,0,.55);
      box-shadow: 0 10px 34px rgba(0,0,0,.35);
      backdrop-filter: blur(6px);
    }

    .leftBig{
      font-size: 48px;
      font-weight: 900;
      letter-spacing: .5px;
      color: #39ff14;
      text-shadow: 0 0 10px rgba(57,255,20,.22);
      line-height: 1.05;
      margin-bottom: 10px;
    }

    .rowTop{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
      margin-top: 4px;
      margin-bottom: 6px;
    }
    .label{
      font-size: 12px;
      color: rgba(255,255,255,.75);
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 800;
    }
    .valueSmall{
      font-size: 12px;
      color: rgba(255,255,255,.75);
      font-weight: 800;
    }

    .bar{
      height: 16px;
      background: rgba(255,255,255,.12);
      border-radius: 999px;
      overflow:hidden;
      margin-bottom: 12px;
    }
    .fillGreen{
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg,#39ff14,#00d26a);
      transition: width .25s ease;
    }
    .fillPurple{
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg,#7c3aed,#b68cff);
      transition: width .25s ease;
    }

    .footer{
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size: 13px;
      color: rgba(255,255,255,.75);
      font-weight: 800;
    }
    .footer b{
      color:#fff;
      font-weight:900;
    }
    .status{
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,.65);
      font-weight: 700;
      letter-spacing: .03em;
    }
  </style>
</head>
<body>
  <!-- Images behind HUD -->
  <div class="imgLayer" id="imgBack"></div>

  <!-- HUD wrapper -->
  <div id="hudWrap">
    <!-- Weather strip (keep weather!) -->
    <div class="weatherStrip">
      <div class="wsCity" id="city">WAITING FOR GPS...</div>
      <div class="wsSep"></div>
      <div class="wsTemp" id="temp">--°C</div>
      <div class="wsSep"></div>
      <div>
        <div class="wsClock" id="clock">00:00:00</div>
        <div class="wsDate" id="date">---</div>
      </div>
    </div>

    <!-- Main panel -->
    <div class="panel">
      <div class="leftBig" id="leftBig">LEFT: 0m</div>

      <!-- "Current lap" like in your screenshot.
           По умолчанию это прогресс до следующего 1км (lapGoal=1000),
           можно поменять из базы: walkathon/state/lapGoalMeters -->
      <div class="rowTop">
        <div class="label" id="lapTitle">CURRENT LAP</div>
        <div class="valueSmall" id="lapValue">0m / 1.00km</div>
      </div>
      <div class="bar"><div class="fillGreen" id="lapFill"></div></div>

      <!-- Total goal -->
      <div class="rowTop">
        <div class="label" id="totalTitle">TOTAL WALKATHON GOAL</div>
        <div class="valueSmall" id="totalPct">0%</div>
      </div>
      <div class="bar"><div class="fillPurple" id="totalFill"></div></div>

      <div class="footer">
        <div>WALKED: <b id="walked">0m</b></div>
        <div>GOAL: <b id="goalTxt">0m</b></div>
      </div>

      <div class="status" id="status">GPS: idle</div>
    </div>
  </div>

  <!-- Images above HUD -->
  <div class="imgLayer" id="imgFront"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCZbd5_egCnte2hKI7PmKgduHpyw1v7jAo",
      authDomain: "walkathon-a4233.firebaseapp.com",
      databaseURL: "https://walkathon-a4233-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "walkathon-a4233",
      storageBucket: "walkathon-a4233.firebasestorage.app",
      messagingSenderId: "314823180241",
      appId: "1:314823180241:web:bbfe6e689c18ec5d922af0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // UI
    const cityEl = document.getElementById('city');
    const tempEl = document.getElementById('temp');
    const clockEl = document.getElementById('clock');
    const dateEl  = document.getElementById('date');

    const leftBigEl = document.getElementById('leftBig');
    const lapValueEl = document.getElementById('lapValue');
    const lapFillEl = document.getElementById('lapFill');

    const totalPctEl = document.getElementById('totalPct');
    const totalFillEl = document.getElementById('totalFill');

    const walkedEl = document.getElementById('walked');
    const goalTxtEl = document.getElementById('goalTxt');
    const statusEl = document.getElementById('status');

    // Clock
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2,'0');
      const m = String(now.getMinutes()).padStart(2,'0');
      const s = String(now.getSeconds()).padStart(2,'0');
      clockEl.textContent = `${h}:${m}:${s}`;

      const weekdays = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      dateEl.textContent = `${weekdays[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    function fmtMeters(m) {
      if (m >= 1000) return (m / 1000).toFixed(2) + 'km';
      return Math.round(m) + 'm';
    }

    // Weather/city from GPS
    let lastWeatherKey = '';
    let lastWeatherFetchAt = 0;

    async function updateWeatherAndCity(lat, lon) {
      try {
        const roundedKey = `${lat.toFixed(3)},${lon.toFixed(3)}`;
        const now = Date.now();
        if (roundedKey === lastWeatherKey && now - lastWeatherFetchAt < 60000) return;
        lastWeatherKey = roundedKey;
        lastWeatherFetchAt = now;

        // temp
        const weatherRes = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m`
        );
        const weatherData = await weatherRes.json();
        if (weatherData?.current && typeof weatherData.current.temperature_2m !== 'undefined') {
          tempEl.textContent = Math.round(weatherData.current.temperature_2m) + '°C';
        }

        // city
        const geoRes = await fetch(
          `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`,
          { headers: { "Accept": "application/json" } }
        );
        const geoData = await geoRes.json();
        if (geoData?.address) {
          const city =
            geoData.address.city ||
            geoData.address.town ||
            geoData.address.village ||
            geoData.address.hamlet ||
            geoData.address.county ||
            'UNKNOWN';
          const country = geoData.address.country_code ? geoData.address.country_code.toUpperCase() : '';
          cityEl.textContent = `${city} · ${country}`;
        } else {
          cityEl.textContent = 'LOCATION UNKNOWN';
        }
      } catch (e) {
        cityEl.textContent = 'LOCATION UNAVAILABLE';
      }
    }

    // Main state
    const stateRef = ref(db, 'walkathon/state');
    onValue(stateRef, (snap) => {
      const s = snap.val() || {};

      const distance = Number(s.distanceMeters || 0);
      const goal = Number(s.goalMeters || 25000);

      const left = Math.max(goal - distance, 0);
      const pct = goal > 0 ? Math.min((distance / goal) * 100, 100) : 0;

      leftBigEl.textContent = `LEFT: ${fmtMeters(left)}`;
      walkedEl.textContent = fmtMeters(distance);
      goalTxtEl.textContent = fmtMeters(goal);

      totalPctEl.textContent = `${pct.toFixed(1)}%`;
      totalFillEl.style.width = pct + '%';

      // "Current lap" (progress to next chunk)
      // default 1000m, can be set in DB: walkathon/state/lapGoalMeters
      const lapGoal = Number(s.lapGoalMeters || 1000);
      const lap = lapGoal > 0 ? (distance % lapGoal) : 0;
      const lapPct = lapGoal > 0 ? Math.min((lap / lapGoal) * 100, 100) : 0;

      lapValueEl.textContent = `${fmtMeters(lap)} / ${fmtMeters(lapGoal)}`;
      lapFillEl.style.width = lapPct + '%';

      statusEl.textContent = 'GPS: ' + (s.status || 'idle');

      if (typeof s.latitude === 'number' && typeof s.longitude === 'number') {
        updateWeatherAndCity(s.latitude, s.longitude);
      } else {
        cityEl.textContent = 'WAITING FOR GPS...';
      }
    });

    // Friend-controlled images
    const overlayId = new URLSearchParams(location.search).get("id") || "default";
    const imgBack = document.getElementById("imgBack");
    const imgFront = document.getElementById("imgFront");
    const itemsRef = ref(db, `walkathon/overlays/${overlayId}/items`);
    const itemEls = new Map();

    function layerParent(layer) {
      return (layer === "back") ? imgBack : imgFront;
    }

    function upsertItem(id, it) {
      let el = itemEls.get(id);
      const parent = layerParent(it.layer === "back" ? "back" : "front");

      if (!el) {
        el = document.createElement("img");
        el.className = "ovItem";
        itemEls.set(id, el);
        parent.appendChild(el);
      } else if (el.parentElement !== parent) {
        parent.appendChild(el);
      }

      el.src = it.url || "";
      const x = Number(it.x ?? 0);
      const y = Number(it.y ?? 0);
      const sc = Number(it.scale ?? 1);
      const rot = Number(it.rotate ?? 0);
      const op = Number(it.opacity ?? 1);
      const hidden = it.hidden === true;

      el.style.display = hidden ? "none" : "block";
      el.style.opacity = String(op);
      el.style.transform = `translate(${x}px, ${y}px) scale(${sc}) rotate(${rot}deg)`;
    }

    function pruneItems(alive) {
      for (const [id, el] of itemEls.entries()) {
        if (!alive.has(id)) {
          el.remove();
          itemEls.delete(id);
        }
      }
    }

    onValue(itemsRef, (snap) => {
      const items = snap.val() || {};
      const alive = new Set(Object.keys(items));
      for (const id of Object.keys(items)) upsertItem(id, items[id]);
      pruneItems(alive);
    });
  </script>
</body>
</html>
