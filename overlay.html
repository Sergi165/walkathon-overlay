<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Walkathon Overlay</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: transparent;
      color: #fff;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }

    .overlay {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: linear-gradient(135deg, rgba(23, 26, 33, 0.95), rgba(15, 17, 21, 0.98));
      backdrop-filter: blur(12px);
      border: 2px solid rgba(57, 255, 20, 0.3);
      border-radius: 20px;
      padding: 20px 28px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), 0 0 40px rgba(57, 255, 20, 0.15);
      min-width: 320px;
      animation: slideIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-60px) scale(0.9);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    .title {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #a6adbb;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .title::before {
      content: "📍";
      font-size: 16px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.1); }
    }

    .distance {
      font-size: 56px;
      font-weight: 900;
      background: linear-gradient(135deg, #39ff14, #00d26a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 8px;
      text-shadow: 0 0 30px rgba(57, 255, 20, 0.5);
      animation: glow 3s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { filter: brightness(1) drop-shadow(0 0 10px rgba(57, 255, 20, 0.4)); }
      50% { filter: brightness(1.2) drop-shadow(0 0 20px rgba(57, 255, 20, 0.6)); }
    }

    .goal {
      font-size: 16px;
      color: #a6adbb;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .goal-value {
      color: #39ff14;
      font-weight: 700;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
      margin-bottom: 16px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #39ff14, #00d26a, #39ff14);
      background-size: 200% 100%;
      border-radius: 20px;
      width: 0%;
      transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: shimmer 3s linear infinite;
      box-shadow: 0 0 20px rgba(57, 255, 20, 0.6);
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.05);
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }

    .stat:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(57, 255, 20, 0.3);
      transform: translateY(-2px);
    }

    .stat-label {
      font-size: 11px;
      color: #a6adbb;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    .status-idle {
      background: rgba(166, 173, 187, 0.2);
      color: #a6adbb;
    }

    .status-tracking {
      background: rgba(57, 255, 20, 0.2);
      color: #39ff14;
      animation: pulse-status 2s ease-in-out infinite;
    }

    .status-acquiring,
    .status-calibrating,
    .status-starting {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
      animation: pulse-status 1s ease-in-out infinite;
    }

    .status-stopped {
      background: rgba(217, 58, 73, 0.2);
      color: #ff6b6b;
    }

    .status-error,
    .status-weak {
      background: rgba(217, 58, 73, 0.3);
      color: #ff4444;
      animation: shake 0.5s ease infinite;
    }

    @keyframes pulse-status {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-2px); }
      75% { transform: translateX(2px); }
    }

    .location-info {
      margin-top: 12px;
      padding: 10px;
      background: rgba(57, 255, 20, 0.05);
      border-radius: 10px;
      border: 1px solid rgba(57, 255, 20, 0.2);
      font-size: 12px;
      color: #a6adbb;
    }

    .coords {
      font-family: 'Courier New', monospace;
      color: #39ff14;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="title">🚶 Walkathon Progress</div>
    
    <div class="distance" id="distance">0m</div>
    <div class="goal">Goal: <span class="goal-value" id="goal">25,000m</span></div>
    
    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>
    
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Status</div>
        <div class="stat-value">
          <span class="status-badge status-idle" id="status">Idle</span>
        </div>
      </div>
      
      <div class="stat">
        <div class="stat-label">Accuracy</div>
        <div class="stat-value" id="accuracy">-</div>
      </div>
      
      <div class="stat">
        <div class="stat-label">Speed</div>
        <div class="stat-value" id="speed">0 km/h</div>
      </div>
      
      <div class="stat">
        <div class="stat-label">Remaining</div>
        <div class="stat-value" id="remaining">-</div>
      </div>
    </div>
    
    <div class="location-info" id="locationInfo" style="display: none;">
      <div>📍 <span class="coords" id="coords">-</span></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCZbd5_egCnte2hKI7PmKgduHpyw1v7jAo",
      authDomain: "walkathon-a4233.firebaseapp.com",
      databaseURL: "https://walkathon-a4233-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "walkathon-a4233",
      storageBucket: "walkathon-a4233.firebasestorage.app",
      messagingSenderId: "314823180241",
      appId: "1:314823180241:web:bbfe6e689c18ec5d922af0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const stateRef = ref(db, "walkathon/state");

    const distanceEl = document.getElementById("distance");
    const goalEl = document.getElementById("goal");
    const progressEl = document.getElementById("progress");
    const statusEl = document.getElementById("status");
    const accuracyEl = document.getElementById("accuracy");
    const speedEl = document.getElementById("speed");
    const remainingEl = document.getElementById("remaining");
    const locationInfoEl = document.getElementById("locationInfo");
    const coordsEl = document.getElementById("coords");

    const DEFAULT_GOAL = 25000;

    function formatDistance(meters) {
      if (meters >= 1000) {
        return (meters / 1000).toFixed(2) + "km";
      }
      return Math.round(meters) + "m";
    }

    function formatNumber(num) {
      return new Intl.NumberFormat('ru-RU').format(Math.round(num));
    }

    function getStatusClass(status) {
      const statusLower = (status || "idle").toLowerCase();
      
      if (statusLower.includes("track")) return "status-tracking";
      if (statusLower.includes("acquir") || statusLower.includes("calibrat") || statusLower.includes("start")) return "status-acquiring";
      if (statusLower.includes("stop")) return "status-stopped";
      if (statusLower.includes("error") || statusLower.includes("weak")) return "status-error";
      
      return "status-idle";
    }

    function getStatusText(status) {
      const statusLower = (status || "idle").toLowerCase();
      
      if (statusLower.includes("track")) return "🟢 Tracking";
      if (statusLower.includes("acquir")) return "🟡 Acquiring GPS";
      if (statusLower.includes("calibrat")) return "🟡 Calibrating";
      if (statusLower.includes("start")) return "🟡 Starting";
      if (statusLower.includes("weak")) return "🔴 Weak Signal";
      if (statusLower.includes("stop")) return "⏸️ Stopped";
      if (statusLower.includes("error")) return "🔴 GPS Error";
      if (statusLower.includes("reset")) return "🔄 Reset";
      
      return "⚪ Idle";
    }

    // 🔥 Слушаем изменения в Firebase
    onValue(stateRef, (snapshot) => {
      const data = snapshot.val();
      
      if (!data) {
        console.log("⚠️ No data from Firebase");
        return;
      }

      console.log("📡 Firebase update:", data);

      // Дистанция
      const distance = data.distanceMeters || 0;
      const goal = data.goalMeters || DEFAULT_GOAL;
      
      distanceEl.textContent = formatDistance(distance);
      goalEl.textContent = formatDistance(goal);

      // Прогресс бар
      const percent = goal > 0 ? Math.min((distance / goal) * 100, 100) : 0;
      progressEl.style.width = percent + "%";

      // 🔥 ГЛАВНОЕ: Статус обновляется ВСЕГДА, даже если distance = 0!
      const status = data.status || "idle";
      statusEl.textContent = getStatusText(status);
      statusEl.className = "status-badge " + getStatusClass(status);

      // Точность
      if (data.accuracy != null) {
        accuracyEl.textContent = Math.round(data.accuracy) + "m";
      } else {
        accuracyEl.textContent = "-";
      }

      // Скорость
      if (data.speed != null) {
        speedEl.textContent = (data.speed * 3.6).toFixed(1) + " km/h";
      } else {
        speedEl.textContent = "0 km/h";
      }

      // Остаток
      const remaining = Math.max(goal - distance, 0);
      remainingEl.textContent = formatDistance(remaining);

      // Координаты
      if (data.latitude != null && data.longitude != null) {
        locationInfoEl.style.display = "block";
        coordsEl.textContent = `${data.latitude.toFixed(5)}, ${data.longitude.toFixed(5)}`;
      } else {
        locationInfoEl.style.display = "none";
      }
    });

    console.log("🎬 Overlay initialized - listening to Firebase");
  </script>
</body>
</html>
