<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Overlay Control</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; }
    input, button, select { font-size: 14px; padding: 8px; }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:8px 0; }
    .card { border:1px solid #ddd; padding:10px; border-radius:10px; margin:10px 0; }
    .small { color:#666; font-size:12px; }
    label { font-size:12px; color:#333; display:flex; flex-direction:column; gap:4px; }

    #viewport {
      width: 100%;
      max-width: 1200px;
      aspect-ratio: 16 / 9;
      max-height: 60vh;
      border: 1px dashed #999;
      border-radius: 10px;
      background: #111;
      position: relative;
      overflow: hidden;
    }

    #stage {
      width: 1920px;
      height: 1080px;
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: top left;
    }

    .item {
      position:absolute;
      left:0;
      top:0;
      transform-origin: center center;
      cursor: move;
      user-select:none;
      -webkit-user-select:none;
      touch-action: none;
      will-change: transform, opacity;
      border: none;
    }

    .item.selected { outline: 2px solid rgba(124,58,237,.95); outline-offset: 2px; }
    .item.lowOpacity { outline: 2px dashed rgba(255,255,255,.35); outline-offset: 2px; }

    .ytBox{
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      overflow: hidden;
    }
    .ytBox::before{
      content: "YouTube";
      position:absolute;
      left:8px; top:6px;
      font: 12px/1 monospace;
      color: rgba(255,255,255,.65);
      z-index: 2;
    }
  </style>
</head>
<body>
  <h2>Overlay Control</h2>

  <div class="card">
    <div class="row">
      <b>Overlay ID:</b>
      <input id="overlayId" />
      <span class="small">Должен совпадать с overlay.html?id=...</span>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <input id="email" placeholder="email" />
      <input id="pass" placeholder="password" type="password" />
      <button id="loginBtn">Login</button>
      <button id="logoutBtn" disabled>Logout</button>
      <span id="authState" class="small"></span>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <select id="kind">
        <option value="img">Image (URL)</option>
        <option value="yt">YouTube (URL)</option>
      </select>

      <input id="url" style="flex:1" placeholder="URL (png/webp или ссылка на youtube)" />

      <select id="newLayer">
        <option value="front">front</option>
        <option value="back">back</option>
      </select>

      <button id="addBtn">Add</button>
    </div>
    <div class="small">
      Image: прямая ссылка на PNG/WebP.<br>
      YouTube: https://youtu.be/... или https://www.youtube.com/watch?v=...
    </div>
  </div>

  <div class="card">
    <b>Поле (перетаскивание):</b>
    <div class="small">Превью 16:9, внутри 1920×1080.</div>
    <div id="viewport"><div id="stage"></div></div>
  </div>

  <div class="card">
    <b>Выбранный элемент:</b>
    <div class="row">
      <span class="small" id="sel">Ничего не выбрано</span>
      <button id="resetBtn" disabled>Reset</button>
      <button id="delBtn" disabled>Delete</button>
      <button id="hideBtn" disabled>Hide/Show</button>
    </div>

    <div class="row">
      <label>Layer
        <select id="layerSel" disabled>
          <option value="front">front</option>
          <option value="back">back</option>
        </select>
      </label>

      <label>Opacity
        <input id="op" type="range" min="0" max="1" step="0.01" value="1" disabled>
      </label>

      <label>Scale
        <input id="sc" type="range" min="0.1" max="3" step="0.01" value="1" disabled>
      </label>

      <label>Rotate
        <input id="rt" type="range" min="-180" max="180" step="1" value="0" disabled>
      </label>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCZbd5_egCnte2hKI7PmKgduHpyw1v7jAo",
      authDomain: "walkathon-a4233.firebaseapp.com",
      databaseURL: "https://walkathon-a4233-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "walkathon-a4233",
      storageBucket: "walkathon-a4233.firebasestorage.app",
      messagingSenderId: "314823180241",
      appId: "1:314823180241:web:bbfe6e689c18ec5d922af0"
    };

    const VW = 1920, VH = 1080;

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const $ = (id) => document.getElementById(id);
    const viewport = $("viewport");
    const stage = $("stage");

    const qsId = new URLSearchParams(location.search).get("id") || "default";
    $("overlayId").value = qsId;

    let overlayId = $("overlayId").value.trim() || "default";
    function basePath() { return `walkathon/overlays/${overlayId}/items`; }

    $("loginBtn").onclick = async () => {
      await signInWithEmailAndPassword(auth, $("email").value.trim(), $("pass").value);
    };
    $("logoutBtn").onclick = async () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
      $("authState").textContent = user ? `Logged: ${user.email}` : "Not logged";
      $("logoutBtn").disabled = !user;
      $("loginBtn").disabled = !!user;
    });

    function setControlsEnabled(enabled) {
      $("resetBtn").disabled = !enabled;
      $("delBtn").disabled = !enabled;
      $("hideBtn").disabled = !enabled;
      $("layerSel").disabled = !enabled;
      $("op").disabled = !enabled;
      $("sc").disabled = !enabled;
      $("rt").disabled = !enabled;
    }

    function getScale() {
      const rect = viewport.getBoundingClientRect();
      return rect.width / VW;
    }
    function applyStageScale() {
      stage.style.transform = `scale(${getScale()})`;
    }
    applyStageScale();
    addEventListener("resize", applyStageScale);

    let selectedId = null;
    let itemsCache = {};
    const els = new Map();

    function parseYouTubeId(url){
      const s = String(url || "").trim();
      let m = s.match(/youtu\.be\/([a-zA-Z0-9_-]{6,})/);
      if (m) return m[1];
      m = s.match(/[?&]v=([a-zA-Z0-9_-]{6,})/);
      if (m) return m[1];
      m = s.match(/\/embed\/([a-zA-Z0-9_-]{6,})/);
      if (m) return m[1];
      return null;
    }

    function ytSrc(id){
      const vid = encodeURIComponent(id || "");
      return `https://www.youtube.com/embed/${vid}?autoplay=1&mute=1&controls=0&playsinline=1&loop=1&playlist=${vid}`;
    }

    function select(id) {
      selectedId = id;
      for (const [iid, el] of els.entries()) el.classList.toggle("selected", iid === id);

      if (!id) {
        $("sel").textContent = "Ничего не выбрано";
        setControlsEnabled(false);
        return;
      }

      const it = itemsCache[id] || {};
      $("sel").textContent = `Selected: ${id}`;
      setControlsEnabled(true);

      $("layerSel").value = it.layer === "back" ? "back" : "front";
      $("op").value = it.opacity ?? 1;
      $("sc").value = it.scale ?? 1;
      $("rt").value = it.rotate ?? 0;
    }

    async function patchSelected(patch) {
      if (!selectedId) return;
      await update(ref(db, `${basePath()}/${selectedId}`), patch);
    }

    $("layerSel").addEventListener("change", () => patchSelected({ layer: $("layerSel").value }));
    $("op").addEventListener("input", () => patchSelected({ opacity: Number($("op").value) }));
    $("sc").addEventListener("input", () => patchSelected({ scale: Number($("sc").value) }));
    $("rt").addEventListener("input", () => patchSelected({ rotate: Number($("rt").value) }));

    $("delBtn").onclick = async () => {
      if (!selectedId) return;
      await remove(ref(db, `${basePath()}/${selectedId}`));
      select(null);
    };

    $("hideBtn").onclick = async () => {
      if (!selectedId) return;
      const it = itemsCache[selectedId] || {};
      await patchSelected({ hidden: !(it.hidden === true) });
    };

    $("resetBtn").onclick = async () => {
      if (!selectedId) return;
      await patchSelected({
        x: 80, y: 80,
        scale: 1,
        rotate: 0,
        opacity: 1,
        layer: "front",
        hidden: false
      });
    };

    async function addItem(kind, urlOrId, layer) {
      const id = "it_" + Math.random().toString(16).slice(2);

      const base = {
        layer: layer === "back" ? "back" : "front",
        x: 80, y: 80,
        scale: 1,
        rotate: 0,
        opacity: 1,
        hidden: false
      };

      let item = null;

      if (kind === "yt") {
        const ytId = parseYouTubeId(urlOrId);
        if (!ytId) throw new Error("Не смог распарсить YouTube ID");
        item = { ...base, type: "yt", ytId, w: 560, h: 315 };
      } else {
        item = { ...base, type: "img", url: urlOrId };
      }

      await set(ref(db, `${basePath()}/${id}`), item);
    }

    $("addBtn").onclick = async () => {
      const kind = $("kind").value;
      const url = $("url").value.trim();
      if (!url) return alert("Вставь URL");

      try {
        await addItem(kind, url, $("newLayer").value);
        $("url").value = "";
      } catch (e) {
        alert(e.message || e);
      }
    };

    $("overlayId").addEventListener("change", () => {
      overlayId = $("overlayId").value.trim() || "default";
      bind();
    });

    // ВАЖНО: YouTube делаем контейнером div (таскаем div), а iframe внутри не ловит клики
    function makeEl(it){
      if (it.type === "yt") {
        const box = document.createElement("div");
        box.className = "item ytBox";
        box.style.position = "absolute";

        const f = document.createElement("iframe");
        f.allow = "autoplay; encrypted-media";
        f.frameBorder = "0";
        f.style.width = "100%";
        f.style.height = "100%";
        f.style.pointerEvents = "none"; // иначе drag ломается

        box.appendChild(f);
        return box;
      }

      const img = document.createElement("img");
      img.className = "item";
      return img;
    }

    function setPreviewStyle(el, it, isSelected) {
      const x = Number(it.x ?? 0);
      const y = Number(it.y ?? 0);
      const s = Number(it.scale ?? 1);
      const r = Number(it.rotate ?? 0);
      const o = Number(it.opacity ?? 1);
      const hidden = it.hidden === true;

      const PREVIEW_MIN_OPACITY = 0.18;
      const previewOpacity = hidden ? 0 : Math.max(o, PREVIEW_MIN_OPACITY);

      el.style.display = hidden ? "none" : "block";
      el.style.opacity = String(previewOpacity);
      el.style.transform = `translate(${x}px, ${y}px) scale(${s}) rotate(${r}deg)`;

      if (it.w && it.h) {
        el.style.width = Number(it.w) + "px";
        el.style.height = Number(it.h) + "px";
      } else {
        el.style.width = "";
        el.style.height = "";
      }

      el.classList.toggle("lowOpacity", !hidden && o < PREVIEW_MIN_OPACITY);
      el.classList.toggle("selected", isSelected);
    }

    function upsert(id, it) {
      let el = els.get(id);
      const wantType = it.type === "yt" ? "yt" : "img";

      if (!el || el.dataset.type !== wantType) {
        if (el) el.remove();
        el = makeEl(it);
        el.dataset.type = wantType;
        els.set(id, el);
        stage.appendChild(el);

        let drag = null;

        el.addEventListener("pointerdown", (e) => {
          select(id);
          el.setPointerCapture(e.pointerId);

          const cur = itemsCache[id] || {};
          drag = {
            sx: e.clientX,
            sy: e.clientY,
            bx: Number(cur.x ?? 0),
            by: Number(cur.y ?? 0),
            dx: 0,
            dy: 0,
            scale: getScale()
          };
        });

        el.addEventListener("pointermove", (e) => {
          if (!drag) return;

          drag.dx = (e.clientX - drag.sx) / drag.scale;
          drag.dy = (e.clientY - drag.sy) / drag.scale;

          const nx = Math.round(drag.bx + drag.dx);
          const ny = Math.round(drag.by + drag.dy);

          const cur = itemsCache[id] || {};
          const s = Number(cur.scale ?? 1);
          const r = Number(cur.rotate ?? 0);
          const o = Number(cur.opacity ?? 1);

          const PREVIEW_MIN_OPACITY = 0.18;
          el.style.opacity = String(Math.max(o, PREVIEW_MIN_OPACITY));
          el.style.transform = `translate(${nx}px, ${ny}px) scale(${s}) rotate(${r}deg)`;
        });

        el.addEventListener("pointerup", async () => {
          if (!drag) return;
          const nx = Math.round(drag.bx + drag.dx);
          const ny = Math.round(drag.by + drag.dy);
          drag = null;
          await update(ref(db, `${basePath()}/${id}`), { x: nx, y: ny });
        });
      }

      if (wantType === "yt") {
        const src = ytSrc(it.ytId || "");
        const iframe = el.querySelector("iframe");
        if (iframe && iframe.src !== src) iframe.src = src;
      } else {
        el.src = it.url || "";
      }

      setPreviewStyle(el, it, id === selectedId);
    }

    function prune(items) {
      const alive = new Set(Object.keys(items));
      for (const [id, el] of els.entries()) {
        if (!alive.has(id)) { el.remove(); els.delete(id); }
      }
      if (selectedId && !alive.has(selectedId)) select(null);
    }

    let bound = false;
    function bind() {
      stage.innerHTML = "";
      els.clear();
      itemsCache = {};
      select(null);

      const r = ref(db, basePath());
      onValue(r, (snap) => {
        const items = snap.val() || {};
        itemsCache = items;
        for (const id of Object.keys(items)) upsert(id, items[id]);
        prune(items);
      });

      bound = true;
    }

    if (!bound) bind();
  </script>
</body>
</html>
